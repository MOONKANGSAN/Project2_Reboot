spring.application.name=Project2_Spring

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3307/restaurant_db?serverTimezone=Asia/Seoul}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root_password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

server.port=8080

# 파일 업로드 크기 제한
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# 점포 이미지 저장 경로
app.upload.restaurant.dir=C:/project2/uploads/restaurant

# 리뷰 이미지 저장 경로
app.upload.review.dir=C:/project2/uploads/review

# 평균 별점 갱신 스케줄러 cron (활성화: "0 0 0 * * *" / 비활성화: "-")
schedule.rating.cron=-

