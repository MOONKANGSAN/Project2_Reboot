# =====================================================
# 프로덕션 전용 Docker Compose
# 실행: docker compose -f docker-compose.prod.yml up -d --build
# =====================================================

services:

  # ──────────────────────────────────────────────────
  # DB — MySQL 8.0
  # ──────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: project2-db
    restart: always
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - ./mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────────
  # 백엔드 — Spring Boot (JAR 실행, 포트 외부 미노출)
  # ──────────────────────────────────────────────────
  backend:
    build:
      context: ./Project2_Spring
      dockerfile: Dockerfile.prod
    container_name: project2-backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/${MYSQL_DATABASE}?serverTimezone=Asia/Seoul&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
    volumes:
      - ./uploads:/app/uploads

  # ──────────────────────────────────────────────────
  # 프론트엔드 — Nginx 정적 서빙 (포트 외부 미노출)
  # ──────────────────────────────────────────────────
  frontend:
    build:
      context: ./Project2_Front
      dockerfile: Dockerfile.prod
    container_name: project2-frontend
    restart: always
    depends_on:
      - backend

  # ──────────────────────────────────────────────────
  # 리버스 프록시 — Nginx (유일한 외부 노출 포트)
  # HTTP(80) → HTTPS(443) 리다이렉트
  # HTTPS(443) → /api/* backend / /* frontend
  # ──────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: project2-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - backend
      - frontend

  # ──────────────────────────────────────────────────
  # SSL 인증서 — Certbot (Let's Encrypt)
  # 최초 발급: docker compose run --rm certbot certonly ...
  # 자동 갱신: 컨테이너가 12시간마다 갱신 시도
  # ──────────────────────────────────────────────────
  certbot:
    image: certbot/certbot
    container_name: project2-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
