server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        # 1. 파일이 있는지 확인
        # 2. 폴더가 있는지 확인
        # 3. 없으면 index.html로 모든 요청을 전달
        try_files $uri $uri/ /index.html;
        autoindex off; # 디렉토리 인덱스 나열하지 않기
    }
}