# =====================================================
# Nginx 리버스 프록시 설정
# 클라이언트의 모든 요청을 단일 포트(80)로 수신하여
# 경로에 따라 백엔드/프론트엔드 컨테이너로 분기
# =====================================================

# 워커 프로세스당 최대 동시 연결 수
events {
    worker_connections 1024;
}

http {

    # ── 업스트림 서버 정의 ─────────────────────────────
    # Docker 컨테이너 이름을 호스트로 사용 (같은 네트워크 내에서 DNS 자동 해석)
    upstream backend {
        server backend:8080;
    }

    upstream frontend {
        server frontend:5173;
    }

    server {
        listen 80;
        server_name localhost;

        # ── API 요청 → Spring Boot 백엔드 ────────────────
        # /api/ 로 시작하는 요청을 백엔드로 프록시
        location /api/ {
            proxy_pass         http://backend/api/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── Vite HMR WebSocket 연결 ───────────────────────
        # 개발 환경에서 Hot Module Replacement를 위한 WebSocket 업그레이드 처리
        location /@vite/ {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
        }

        # ── 프론트엔드 요청 → Vite 개발 서버 ─────────────
        # 나머지 모든 요청을 프론트엔드로 프록시 (WebSocket HMR 포함)
        location / {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;

            # 프록시 타임아웃 설정 (개발 서버 시작 대기 시간 확보)
            proxy_read_timeout 300s;
            proxy_connect_timeout 75s;
        }
    }
}
