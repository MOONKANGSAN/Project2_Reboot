# =====================================================
# Nginx 프로덕션 리버스 프록시 설정
# HTTP(80) → HTTPS(443) 강제 리다이렉트
# HTTPS에서 /api/* → backend, /* → frontend 정적 파일
# =====================================================

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # 파일 전송 최적화
    sendfile on;
    keepalive_timeout 65;

    # ── gzip 압축 ─────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1024;

    # ── 업스트림 백엔드 ───────────────────────────────
    upstream backend {
        server backend:8080;
    }

    # ── HTTP → HTTPS 리다이렉트 ───────────────────────
    server {
        listen 80;
        server_name YOUR_DOMAIN.com www.YOUR_DOMAIN.com;

        # Let's Encrypt 도메인 인증용 경로 (certbot webroot)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # 나머지 모든 HTTP 요청을 HTTPS로 301 리다이렉트
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS 메인 서버 ───────────────────────────────
    server {
        listen 443 ssl;
        server_name YOUR_DOMAIN.com www.YOUR_DOMAIN.com;

        # ── SSL 인증서 경로 (Let's Encrypt) ────────────
        ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN.com/privkey.pem;

        # ── SSL 보안 강화 설정 ──────────────────────────
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # HSTS: 브라우저가 1년간 HTTPS만 사용하도록 강제
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # ── API 요청 → Spring Boot 백엔드 ────────────────
        location /api/ {
            proxy_pass         http://backend/api/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── 정적 파일 → 프론트엔드 컨테이너 ─────────────
        location / {
            proxy_pass         http://frontend:80;
            proxy_http_version 1.1;
            proxy_set_header   Host      $host;
            proxy_set_header   X-Real-IP $remote_addr;

            # SPA 라우팅: 404 시 index.html 반환
            proxy_intercept_errors on;
            error_page 404 = @fallback;
        }

        location @fallback {
            proxy_pass http://frontend:80;
        }
    }
}
